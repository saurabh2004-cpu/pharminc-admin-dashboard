name: Build and Deploy Admin Dashboard

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: |
          docker build --build-arg VITE_BASE_BACKEND_URL=${{ secrets.VITE_BASE_BACKEND_URL }} -t ${{ secrets.DOCKER_USERNAME }}/admin-dashboard:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/admin-dashboard:latest

      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd /var/www/myapps
            docker-compose pull
            docker-compose up -d