name: Build and Deploy Admin Dashboard

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build & Push Docker Image
        run: |
          docker build \
            --build-arg VITE_BASE_BACKEND_URL=${{ secrets.VITE_BASE_BACKEND_URL }} \
            -t ${{ secrets.DOCKER_USERNAME }}/admin-dashboard:${IMAGE_TAG} \
            -t ${{ secrets.DOCKER_USERNAME }}/admin-dashboard:latest .
          
          docker push ${{ secrets.DOCKER_USERNAME }}/admin-dashboard:${IMAGE_TAG}
          docker push ${{ secrets.DOCKER_USERNAME }}/admin-dashboard:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/myapps

            docker-compose pull
            docker-compose up -d --force-recreate

            # Cleanup unused images
            docker image prune -af